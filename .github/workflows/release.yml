# OpenTone Release Builds
# Triggered by pushing a version tag (v*) or manual dispatch.
# Builds desktop installers for Windows, Linux, and macOS.

name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (must match Cargo.toml / package.json version)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-arm

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci --include=optional

      - name: Run typecheck and build frontend
        run: npm run typecheck && npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            build-essential \
            pkg-config

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenTone v${{ github.ref_name }}"
          releaseBody: |
            ## OpenTone ${{ github.ref_name }}

            Desktop installer for music you own.

            See [CHANGELOG.md](CHANGELOG.md) for details.
          releaseDraft: true
          includeDebug: false
          args: --target ${{ matrix.target }}
